<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Grid/calendar lines (timetable) -->
  <rect x="12" y="18" width="40" height="28" rx="3" fill="white" fill-opacity="0.15"/>
  <line x1="12" y1="25" x2="52" y2="25" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="12" y1="39" x2="52" y2="39" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="22" y1="18" x2="22" y2="46" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="32" y1="18" x2="32" y2="46" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="42" y1="18" x2="42" y2="46" stroke="white" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Filled cells (schedule blocks) -->
  <rect x="13" y="26" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.85"/>
  <rect x="23" y="33" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.85"/>
  <rect x="33" y="26" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.85"/>
  <rect x="43" y="33" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.85"/>
  <rect x="13" y="40" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.6"/>
  <rect x="33" y="40" width="8" height="5" rx="1.5" fill="white" fill-opacity="0.6"/>

  <!-- Spark / AI dot top right -->
  <circle cx="50" cy="14" r="5" fill="#f0abfc"/>
  <line x1="50" y1="9" x2="50" y2="7" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="19" x2="50" y2="21" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="14" x2="43" y2="14" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="14" x2="57" y2="14" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round"/>
</svg>
